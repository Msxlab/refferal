name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: refearn
          POSTGRES_PASSWORD: refearn
          POSTGRES_DB: refearn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U refearn"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://refearn:refearn@localhost:5432/refearn_test
      DATABASE_URL_TEST: postgresql://refearn:refearn@localhost:5432/refearn_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @refearn/api exec prisma generate
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - run: pnpm --filter @refearn/api test:int
