<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Refearn</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #05060a; color: #e7e9ee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; }
    .card { max-width: 420px; text-align: center; }
    .logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg,#f5d27a,#d4a017);
      color: #1a1404; font-weight: 800; font-size: 30px; display: grid; place-items: center; margin: 0 auto 20px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #9aa0ad; font-size: 14px; line-height: 1.6; margin: 0 0 22px; }
    button { background: linear-gradient(135deg,#f5d27a,#d4a017); color: #1a1404; border: 0; border-radius: 10px;
      padding: 11px 22px; font-weight: 700; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h1>You're offline</h1>
    <p>Refearn needs a connection to load live commission and payout data — these are never cached for your security. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
